function displayBooks() {
    const search = document.getElementById("searchInput").value.toLowerCase();
    const filter = document.getElementById("categoryFilter").value;
    const bookList = document.getElementById("bookList");
    bookList.innerHTML = "";

    const filteredBooks = books.filter(book => 
        book.titel.toLowerCase().includes(search) &&
        (filter === "" || book.kategorie === filter)
    );

    filteredBooks.forEach(book => {
        const div = document.createElement("div");
        div.className = "book category-" + book.kategorie;
        div.innerHTML = `
            <strong>${book.titel}</strong><br>
            Nummer: ${book.nummer}<br>
            Kategorie: ${book.kategorie}<br>
        `;
        bookList.appendChild(div);
    });
}

document.getElementById("searchInput").addEventListener("input", displayBooks);
document.getElementById("categoryFilter").addEventListener("change", displayBooks);
